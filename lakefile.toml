name = "hex"
defaultTargets = ["HexAll"]

# Aggregator: requires the full released hex-lll-mathlib closure at a single
# coherent pinned SHA set. Require `hex` to depend on everything released; or
# require an individual library (e.g. hex-lll) for just that piece.

[[require]]
name = "HexMatrix"
git = "https://github.com/leanprover/hex-matrix.git"
rev = "db6b7f7aebf6d1fb193016cbc5b21214bf40ab68"

[[require]]
name = "HexMatrixMathlib"
git = "https://github.com/leanprover/hex-matrix-mathlib.git"
rev = "9ccf1baf235ae8fe10733a279cffa96ff28236dd"

[[require]]
name = "HexGramSchmidt"
git = "https://github.com/leanprover/hex-gram-schmidt.git"
rev = "f5ba63bd84e4086b714375bf3600e4d8cbc67987"

[[require]]
name = "HexGramSchmidtMathlib"
git = "https://github.com/leanprover/hex-gram-schmidt-mathlib.git"
rev = "299142b3d62d6bf792345564074b70532fa304e2"

[[require]]
name = "HexLLL"
git = "https://github.com/leanprover/hex-lll.git"
rev = "48cecff63ba2025f0171ac30f264618b97532413"

[[require]]
name = "HexLLLMathlib"
git = "https://github.com/leanprover/hex-lll-mathlib.git"
rev = "897db8cde6d98a5b02e5110e7167a73daebbe553"

[[lean_lib]]
name = "HexAll"
